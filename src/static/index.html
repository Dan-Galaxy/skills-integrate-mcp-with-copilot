<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
      <button id="dark-mode-toggle" aria-label="Toggle dark mode">🌙 Dark Mode</button>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="filters" class="filters-container">
          <div class="filter-group">
            <label for="filter-activity">Filter by activity</label>
            <select id="filter-activity">
              <option value="all">All activities</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="filter-day">Filter by day</label>
            <select id="filter-day">
              <option value="all">All days</option>
            </select>
          </div>
          <div class="filter-group checkbox-group">
            <label for="filter-open-only">
              <input type="checkbox" id="filter-open-only" />
              Open spots only
            </label>
          </div>
          <button type="button" id="clear-filters">Clear Filters</button>
          <div class="filters-feedback" aria-live="polite">
            <p id="filter-results" class="filter-results">Showing activities</p>
            <div id="active-filters" class="active-filters"></div>
          </div>
        </div>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
